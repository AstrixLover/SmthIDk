kind = "web"
previewPath = "/"
title = "Plasma Confinement Simulator"
version = "1.0.0"
id = "artifacts/plasma-sim"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23521
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/plasma-sim run dev"

[services.env]
PORT = "23521"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/plasma-sim", "run", "build"]
publicDir = "artifacts/plasma-sim/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
